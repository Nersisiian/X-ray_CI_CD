name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pytest pytest-asyncio httpx
          pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check with black
        run: black --check --verbose .

      - name: Download dataset sample
        run: python data/download_data.py

      - name: Train tiny model
        run: python train.py --epochs 1 --batch_size 4 --sample_fraction 0.1

      - name: Run model tests
        run: pytest test_model.py -v

      - name: Run API tests
        run: pytest test_api.py -v

      - name: Build Docker image
        run: docker build -t xray-cicd:latest .

      - name: Run container and test API endpoint
        run: |
          docker run -d --name xray-test -p 8000:8000 -v $(pwd)/models:/app/models xray-cicd:latest python -m app.main
          echo "Waiting for container to start..."
          for i in {1..30}; do
            if curl -s --fail http://localhost:8000/health > /dev/null; then
              echo "Container is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Container failed to start. Logs:"
              docker logs xray-test
              exit 1
            fi
            sleep 2
          done
          docker stop xray-test
